name: Daily Taiwan Stock Scan

on:
  schedule:
    # 台灣時間 14:30 = UTC 06:30
    - cron: "30 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run stock scanner
        run: |
          python tw_stock_after_market_scanner.py

      - name: Commit updated output files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output
          git add watchlist.csv || true
          git commit -m "Auto update stock scan results" || echo "No changes to commit"
          git push
